<svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="920" height="640" fill="#0e1420"/>
  <text x="460" y="40" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">A Day &amp; Week in LifeOS</text>
  <text x="460" y="64" fill="#5ec1ff" font-size="13" text-anchor="middle">Everything runs on a schedule. You just act on what arrives.</text>

  <!-- vertical timeline spine -->
  <line x1="150" y1="100" x2="150" y2="470" stroke="#2a3950" stroke-width="3"/>

  <!-- daily events -->
  <g>
    <circle cx="150" cy="120" r="8" fill="#5ec1ff"/>
    <text x="180" y="118" fill="#5ec1ff" font-size="15" font-weight="700">7:25 AM · Mac wakes</text>
    <text x="180" y="138" fill="#8fa3bd" font-size="11.5">Auto power-on so nothing is missed.</text>
  </g>
  <g>
    <circle cx="150" cy="172" r="8" fill="#7ee0a2"/>
    <text x="180" y="170" fill="#7ee0a2" font-size="15" font-weight="700">7:30 AM · Day scheduler</text>
    <text x="180" y="190" fill="#8fa3bd" font-size="11.5">Yesterday's blocks audited · today's time-blocks placed on both calendars</text>
    <text x="180" y="206" fill="#8fa3bd" font-size="11.5">· phone reminders scheduled for each event (smart lead-times).</text>
  </g>
  <g>
    <circle cx="150" cy="240" r="8" fill="#ffd479"/>
    <text x="180" y="238" fill="#ffd479" font-size="15" font-weight="700">7:45 AM · Morning dashboard</text>
    <text x="180" y="258" fill="#8fa3bd" font-size="11.5">Top 10 ranked actions + pipeline changes. Arrives as email, Telegram</text>
    <text x="180" y="274" fill="#8fa3bd" font-size="11.5">digest, and a voice note. Drafts sit ready to copy-paste.</text>
  </g>
  <g>
    <circle cx="150" cy="312" r="8" fill="#cdd9ec"/>
    <text x="180" y="310" fill="#cdd9ec" font-size="15" font-weight="700">All day · Grace + reminders</text>
    <text x="180" y="330" fill="#8fa3bd" font-size="11.5">Reminders ping at the right moment. Text Grace anything — she</text>
    <text x="180" y="346" fill="#8fa3bd" font-size="11.5">schedules, captures, answers, and asks you gap-fill questions.</text>
  </g>
  <g>
    <circle cx="150" cy="384" r="8" fill="#ff9ec1"/>
    <text x="180" y="382" fill="#ff9ec1" font-size="15" font-weight="700">8:00 PM · Evening brief</text>
    <text x="180" y="402" fill="#8fa3bd" font-size="11.5">Inboxes triaged, reply drafts waiting in Gmail, tomorrow's meetings</text>
    <text x="180" y="418" fill="#8fa3bd" font-size="11.5">prepped, up to 3 thoughtful people to reconnect with.</text>
  </g>
  <g>
    <circle cx="150" cy="450" r="8" fill="#5ec1ff"/>
    <text x="180" y="448" fill="#5ec1ff" font-size="13" font-weight="700">overnight · learns quietly</text>
    <text x="180" y="466" fill="#8fa3bd" font-size="11.5">Which drafts you sent, which blocks you kept — all fed back in.</text>
  </g>

  <!-- weekly band -->
  <rect x="40" y="500" width="840" height="110" rx="12" fill="#15203a" stroke="#3a4a66"/>
  <text x="60" y="528" fill="#5ec1ff" font-size="13" font-weight="700">THE WEEK</text>
  <g>
    <rect x="60" y="542" width="240" height="52" rx="8" fill="#101a2e" stroke="#ff9ec1"/>
    <text x="180" y="564" fill="#ff9ec1" font-size="13" font-weight="700" text-anchor="middle">Sunday · Network Weave</text>
    <text x="180" y="582" fill="#8fa3bd" font-size="10.5" text-anchor="middle">intros, gap-bridges, idea→action</text>
  </g>
  <g>
    <rect x="340" y="542" width="240" height="52" rx="8" fill="#101a2e" stroke="#ffd479"/>
    <text x="460" y="564" fill="#ffd479" font-size="13" font-weight="700" text-anchor="middle">Monday · Weekly Debrief</text>
    <text x="460" y="582" fill="#8fa3bd" font-size="10.5" text-anchor="middle">~5 min Q&amp;A · the only ritual</text>
  </g>
  <g>
    <rect x="620" y="542" width="240" height="52" rx="8" fill="#101a2e" stroke="#7ee0a2"/>
    <text x="740" y="564" fill="#7ee0a2" font-size="13" font-weight="700" text-anchor="middle">Friday · CEO Report</text>
    <text x="740" y="582" fill="#8fa3bd" font-size="10.5" text-anchor="middle">one picture of the whole operation</text>
  </g>
</svg>
