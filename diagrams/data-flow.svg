<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="760" height="720" fill="#0e1420"/>
  <text x="380" y="40" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">The Compounding Loop</text>
  <text x="380" y="64" fill="#5ec1ff" font-size="13" text-anchor="middle">Each pass makes the next one sharper — follow the circle clockwise</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5ec1ff"/>
    </marker>
  </defs>

  <!-- faint guide ring -->
  <circle cx="380" cy="360" r="215" fill="none" stroke="#1c2840" stroke-width="2"/>

  <!-- clockwise arrows between nodes -->
  <g fill="none" stroke="#5ec1ff" stroke-width="2.5">
    <path d="M424.7,149.7 A215,215 0 0,1 539.8,216.1" marker-end="url(#a)"/>
    <path d="M584.5,293.6 A215,215 0 0,1 584.5,426.4" marker-end="url(#a)"/>
    <path d="M539.8,503.9 A215,215 0 0,1 424.7,570.3" marker-end="url(#a)"/>
    <path d="M335.3,570.3 A215,215 0 0,1 220.2,503.9" marker-end="url(#a)"/>
    <path d="M175.5,426.4 A215,215 0 0,1 175.5,293.6" marker-end="url(#a)"/>
    <path d="M220.2,216.1 A215,215 0 0,1 335.3,149.7" marker-end="url(#a)"/>
  </g>

  <!-- center hub -->
  <circle cx="380" cy="360" r="78" fill="#15203a" stroke="#5ec1ff" stroke-width="2"/>
  <text x="380" y="350" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Every</text>
  <text x="380" y="370" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">week</text>
  <text x="380" y="390" fill="#5ec1ff" font-size="13" text-anchor="middle">compounds</text>

  <!-- nodes (clockwise from top) -->
  <g>
    <rect x="296" y="112" width="168" height="66" rx="11" fill="#15203a" stroke="#7ee0a2" stroke-width="2"/>
    <text x="380" y="139" fill="#7ee0a2" font-size="13" font-weight="700" text-anchor="middle">① 🧠 BrainOS</text>
    <text x="380" y="160" fill="#8fa3bd" font-size="10.5" text-anchor="middle">captures ideas &amp; research</text>
  </g>
  <g>
    <rect x="482" y="219" width="168" height="66" rx="11" fill="#15203a" stroke="#5ec1ff" stroke-width="2"/>
    <text x="566" y="246" fill="#5ec1ff" font-size="13" font-weight="700" text-anchor="middle">🔗 The bridge</text>
    <text x="566" y="267" fill="#8fa3bd" font-size="10.5" text-anchor="middle">thinking → outreach</text>
  </g>
  <g>
    <rect x="482" y="435" width="168" height="66" rx="11" fill="#15203a" stroke="#ffd479" stroke-width="2"/>
    <text x="566" y="462" fill="#ffd479" font-size="13" font-weight="700" text-anchor="middle">④ 💼 BizBot</text>
    <text x="566" y="483" fill="#8fa3bd" font-size="10.5" text-anchor="middle">personalized drafts</text>
  </g>
  <g>
    <rect x="296" y="542" width="168" height="66" rx="11" fill="#1b2740" stroke="#ffffff" stroke-width="2"/>
    <text x="380" y="569" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">② 📱 You + Grace</text>
    <text x="380" y="590" fill="#8fa3bd" font-size="10.5" text-anchor="middle">review · send · answer</text>
  </g>
  <g>
    <rect x="110" y="435" width="168" height="66" rx="11" fill="#15203a" stroke="#ff9ec1" stroke-width="2"/>
    <text x="194" y="462" fill="#ff9ec1" font-size="13" font-weight="700" text-anchor="middle">📊 Outcomes</text>
    <text x="194" y="483" fill="#8fa3bd" font-size="10.5" text-anchor="middle">replies · sends · kept</text>
  </g>
  <g>
    <rect x="110" y="219" width="168" height="66" rx="11" fill="#15203a" stroke="#9db3d1" stroke-width="2"/>
    <text x="194" y="246" fill="#cdd9ec" font-size="13" font-weight="700" text-anchor="middle">📈 Learning</text>
    <text x="194" y="267" fill="#8fa3bd" font-size="10.5" text-anchor="middle">playbook · voice · what-works</text>
  </g>

  <text x="380" y="678" fill="#6b7b94" font-size="11.5" text-anchor="middle">Your research sharpens outreach · outcomes teach the system · next week's drafts are better.</text>
</svg>
