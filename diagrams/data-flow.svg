<svg viewBox="0 0 760 730" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="760" height="730" fill="#0e1420"/>
  <text x="380" y="40" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">The Compounding Loop</text>
  <text x="380" y="64" fill="#5ec1ff" font-size="13" text-anchor="middle">Everything spins around the vault — and each pass makes the next one sharper</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5ec1ff"/>
    </marker>
  </defs>

  <!-- faint guide ring -->
  <circle cx="380" cy="360" r="215" fill="none" stroke="#1c2840" stroke-width="2"/>

  <!-- clockwise arrows (with ids for motion) -->
  <g fill="none" stroke="#5ec1ff" stroke-width="2.5">
    <path id="arc1" d="M424.7,149.7 A215,215 0 0,1 539.8,216.1" marker-end="url(#a)"/>
    <path id="arc2" d="M584.5,293.6 A215,215 0 0,1 584.5,426.4" marker-end="url(#a)"/>
    <path id="arc3" d="M539.8,503.9 A215,215 0 0,1 424.7,570.3" marker-end="url(#a)"/>
    <path id="arc4" d="M335.3,570.3 A215,215 0 0,1 220.2,503.9" marker-end="url(#a)"/>
    <path id="arc5" d="M175.5,426.4 A215,215 0 0,1 175.5,293.6" marker-end="url(#a)"/>
    <path id="arc6" d="M220.2,216.1 A215,215 0 0,1 335.3,149.7" marker-end="url(#a)"/>
  </g>

  <!-- flowing dots (animate where supported; degrade to dots at origin) -->
  <g fill="#7ee0a2">
    <circle r="4.5"><animateMotion dur="9s" begin="0s" repeatCount="indefinite"><mpath xlink:href="#arc1"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="9s" begin="1.5s" repeatCount="indefinite"><mpath xlink:href="#arc2"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="9s" begin="3s" repeatCount="indefinite"><mpath xlink:href="#arc3"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="9s" begin="4.5s" repeatCount="indefinite"><mpath xlink:href="#arc4"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="9s" begin="6s" repeatCount="indefinite"><mpath xlink:href="#arc5"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="9s" begin="7.5s" repeatCount="indefinite"><mpath xlink:href="#arc6"/></animateMotion></circle>
  </g>

  <!-- CENTER: the vault, visualized -->
  <rect x="283" y="258" width="194" height="204" rx="14" fill="#13203a" stroke="#7ee0a2" stroke-width="2"/>
  <text x="380" y="282" fill="#7ee0a2" font-size="13" font-weight="700" text-anchor="middle">🧠 The BrainOS Vault</text>
  <g font-size="9.5" text-anchor="start">
    <text x="300" y="306" fill="#cdd9ec"><tspan fill="#5ec1ff">00</tspan> INBOX — raw drops</text>
    <text x="370" y="320" fill="#3a4a66">▼</text>
    <text x="300" y="334" fill="#cdd9ec"><tspan fill="#5ec1ff">01</tspan> CAPTURES — sharpened</text>
    <text x="370" y="348" fill="#3a4a66">▼</text>
    <text x="300" y="362" fill="#cdd9ec"><tspan fill="#5ec1ff">02</tspan> CONNECTIONS — links</text>
    <text x="370" y="376" fill="#3a4a66">▼</text>
    <text x="300" y="390" fill="#cdd9ec"><tspan fill="#5ec1ff">03</tspan> BRIEFS — drafts</text>
    <text x="370" y="404" fill="#3a4a66">▼</text>
    <text x="300" y="418" fill="#cdd9ec"><tspan fill="#5ec1ff">04</tspan> PUBLISHED — live + data</text>
  </g>
  <text x="380" y="446" fill="#8fa3bd" font-size="9" text-anchor="middle">the knowledge core every loop feeds &amp; draws from</text>

  <!-- nodes (clockwise from top) -->
  <g>
    <rect x="296" y="112" width="168" height="66" rx="11" fill="#15203a" stroke="#7ee0a2" stroke-width="2"/>
    <text x="380" y="139" fill="#7ee0a2" font-size="13" font-weight="700" text-anchor="middle">① 🧠 BrainOS</text>
    <text x="380" y="160" fill="#8fa3bd" font-size="10.5" text-anchor="middle">captures ideas &amp; research</text>
  </g>
  <g>
    <rect x="482" y="219" width="168" height="66" rx="11" fill="#15203a" stroke="#5ec1ff" stroke-width="2"/>
    <text x="566" y="246" fill="#5ec1ff" font-size="13" font-weight="700" text-anchor="middle">🔗 The bridge</text>
    <text x="566" y="267" fill="#8fa3bd" font-size="10.5" text-anchor="middle">thinking → outreach</text>
  </g>
  <g>
    <rect x="482" y="435" width="168" height="66" rx="11" fill="#15203a" stroke="#ffd479" stroke-width="2"/>
    <text x="566" y="462" fill="#ffd479" font-size="13" font-weight="700" text-anchor="middle">④ 💼 BizBot</text>
    <text x="566" y="483" fill="#8fa3bd" font-size="10.5" text-anchor="middle">personalized drafts</text>
  </g>
  <g>
    <rect x="296" y="542" width="168" height="66" rx="11" fill="#1b2740" stroke="#ffffff" stroke-width="2"/>
    <text x="380" y="569" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">② 📱 You + Grace</text>
    <text x="380" y="590" fill="#8fa3bd" font-size="10.5" text-anchor="middle">review · send · answer</text>
  </g>
  <g>
    <rect x="110" y="435" width="168" height="66" rx="11" fill="#15203a" stroke="#ff9ec1" stroke-width="2"/>
    <text x="194" y="462" fill="#ff9ec1" font-size="13" font-weight="700" text-anchor="middle">📊 Outcomes</text>
    <text x="194" y="483" fill="#8fa3bd" font-size="10.5" text-anchor="middle">replies · sends · kept</text>
  </g>
  <g>
    <rect x="110" y="219" width="168" height="66" rx="11" fill="#15203a" stroke="#9db3d1" stroke-width="2"/>
    <text x="194" y="246" fill="#cdd9ec" font-size="13" font-weight="700" text-anchor="middle">📈 Learning</text>
    <text x="194" y="267" fill="#8fa3bd" font-size="10.5" text-anchor="middle">playbook · voice · what-works</text>
  </g>

  <!-- arrow content examples (between nodes, just outside the ring) -->
  <g font-size="10" fill="#9db3d1" text-anchor="middle">
    <text x="516" y="120">📝 a fresh capture</text>
    <text x="516" y="133">+ this week's brief</text>

    <text x="660" y="356">💡 a timely</text>
    <text x="660" y="369">angle to lead with</text>

    <text x="516" y="598">✉️ a draft,</text>
    <text x="516" y="611">ready to send</text>

    <text x="244" y="598">📤 you send it;</text>
    <text x="244" y="611">Grace logs the reply</text>

    <text x="100" y="356">💬 reply or</text>
    <text x="100" y="369">no-reply, recorded</text>

    <text x="244" y="120">📈 the winning</text>
    <text x="244" y="133">pattern, fed back</text>
  </g>

  <text x="380" y="708" fill="#6b7b94" font-size="11.5" text-anchor="middle">Your research sharpens outreach · outcomes teach the system · next week's drafts are better.</text>
</svg>
