<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="920" height="600" fill="#0e1420"/>
  <text x="460" y="40" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">How the Agents Feed Each Other</text>
  <text x="460" y="64" fill="#5ec1ff" font-size="13" text-anchor="middle">Information loops between engines — the system gets smarter every week</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5ec1ff"/>
    </marker>
  </defs>

  <!-- nodes -->
  <g>
    <rect x="60" y="120" width="200" height="70" rx="11" fill="#15203a" stroke="#7ee0a2" stroke-width="2"/>
    <text x="160" y="150" fill="#7ee0a2" font-size="15" font-weight="700" text-anchor="middle">🧠 JARVIS</text>
    <text x="160" y="172" fill="#8fa3bd" font-size="10.5" text-anchor="middle">research → captures → briefs</text>
  </g>
  <g>
    <rect x="660" y="120" width="200" height="70" rx="11" fill="#15203a" stroke="#ffd479" stroke-width="2"/>
    <text x="760" y="150" fill="#ffd479" font-size="15" font-weight="700" text-anchor="middle">💼 BizBot</text>
    <text x="760" y="172" fill="#8fa3bd" font-size="10.5" text-anchor="middle">outreach drafts → CRM</text>
  </g>
  <g>
    <rect x="360" y="120" width="200" height="70" rx="11" fill="#15203a" stroke="#ff9ec1" stroke-width="2"/>
    <text x="460" y="150" fill="#ff9ec1" font-size="15" font-weight="700" text-anchor="middle">🌙 LifeBot</text>
    <text x="460" y="172" fill="#8fa3bd" font-size="10.5" text-anchor="middle">inbox · people · calendar</text>
  </g>
  <g>
    <rect x="360" y="350" width="200" height="64" rx="11" fill="#1b2740" stroke="#5ec1ff" stroke-width="2"/>
    <text x="460" y="378" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">📱 Grace</text>
    <text x="460" y="398" fill="#8fa3bd" font-size="10.5" text-anchor="middle">asks you · routes answers back</text>
  </g>
  <g>
    <rect x="60" y="350" width="220" height="64" rx="11" fill="#101a2e" stroke="#3a4a66" stroke-width="1.5"/>
    <text x="170" y="378" fill="#9db3d1" font-size="13" font-weight="700" text-anchor="middle">📈 Learning files</text>
    <text x="170" y="398" fill="#8fa3bd" font-size="10" text-anchor="middle">what-works · playbook · voice</text>
  </g>
  <g>
    <rect x="640" y="350" width="220" height="64" rx="11" fill="#101a2e" stroke="#3a4a66" stroke-width="1.5"/>
    <text x="750" y="378" fill="#9db3d1" font-size="13" font-weight="700" text-anchor="middle">📊 Outcomes</text>
    <text x="750" y="398" fill="#8fa3bd" font-size="10" text-anchor="middle">replies · sends · kept blocks</text>
  </g>

  <!-- flows with labels -->
  <path d="M260 145 L360 145" stroke="#5ec1ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 165 L660 165" stroke="#5ec1ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="135" fill="#9db3d1" font-size="9.5" text-anchor="middle">newsletter</text>
  <text x="310" y="200" fill="#9db3d1" font-size="9.5" text-anchor="middle">captures</text>
  <text x="610" y="155" fill="#9db3d1" font-size="9.5" text-anchor="middle">reply-winning</text>
  <text x="610" y="205" fill="#9db3d1" font-size="9.5" text-anchor="middle">angles</text>

  <!-- JARVIS to BizBot direct (top arc) -->
  <path d="M160 120 Q460 70 760 120" stroke="#5ec1ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="460" y="92" fill="#9db3d1" font-size="10" text-anchor="middle">current thinking → personalizes outreach (the bridge)</text>

  <!-- engines to Grace -->
  <path d="M460 190 L460 350" stroke="#5ec1ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="478" y="275" fill="#9db3d1" font-size="9.5">gaps they can't fill</text>
  <!-- Grace back up -->
  <path d="M540 360 Q640 270 560 195" stroke="#7ee0a2" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="300" fill="#7ee0a2" font-size="9.5" text-anchor="middle">your answers</text>
  <text x="640" y="314" fill="#7ee0a2" font-size="9.5" text-anchor="middle">written back</text>

  <!-- outcomes to learning -->
  <path d="M640 382 L280 382" stroke="#ffd479" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="460" y="436" fill="#9db3d1" font-size="9.5" text-anchor="middle">what worked → learning files → better drafts next time</text>
  <!-- learning back to engines -->
  <path d="M170 350 Q120 250 150 190" stroke="#7ee0a2" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- outcomes from bizbot -->
  <path d="M760 190 L755 350" stroke="#ffd479" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- bottom takeaway -->
  <rect x="160" y="500" width="600" height="56" rx="11" fill="#1b2740" stroke="#5ec1ff" stroke-width="1.5"/>
  <text x="460" y="525" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">The compounding loop</text>
  <text x="460" y="544" fill="#9db3d1" font-size="11" text-anchor="middle">Your thinking feeds outreach → outcomes teach the system → next week's drafts are sharper</text>
</svg>
