<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="920" height="620" fill="#0e1420"/>
  <text x="460" y="40" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">LifeOS Suite — System Architecture</text>
  <text x="460" y="64" fill="#5ec1ff" font-size="13" text-anchor="middle">Three cooperating agents on one machine, controlled from your phone</text>

  <!-- YOU / phone -->
  <rect x="360" y="92" width="200" height="58" rx="10" fill="#1b2740" stroke="#5ec1ff" stroke-width="2"/>
  <text x="460" y="116" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">📱 You — Telegram</text>
  <text x="460" y="136" fill="#8fa3bd" font-size="11" text-anchor="middle">Grace (asks/notifies) · Saved Messages (archive)</text>

  <!-- three engines -->
  <g>
    <rect x="40" y="220" width="250" height="150" rx="12" fill="#15203a" stroke="#7ee0a2" stroke-width="2"/>
    <text x="165" y="248" fill="#7ee0a2" font-size="17" font-weight="700" text-anchor="middle">🧠 JARVIS</text>
    <text x="165" y="270" fill="#cdd9ec" font-size="11.5" text-anchor="middle">Knowledge engine</text>
    <text x="165" y="296" fill="#8fa3bd" font-size="10.5" text-anchor="middle">capture → connect → brief</text>
    <text x="165" y="313" fill="#8fa3bd" font-size="10.5" text-anchor="middle">→ content</text>
    <text x="165" y="344" fill="#6b7b94" font-size="10" text-anchor="middle">Obsidian vault</text>
  </g>
  <g>
    <rect x="335" y="220" width="250" height="150" rx="12" fill="#15203a" stroke="#ffd479" stroke-width="2"/>
    <text x="460" y="248" fill="#ffd479" font-size="17" font-weight="700" text-anchor="middle">💼 BizBot</text>
    <text x="460" y="270" fill="#cdd9ec" font-size="11.5" text-anchor="middle">Business engine</text>
    <text x="460" y="296" fill="#8fa3bd" font-size="10.5" text-anchor="middle">CRM → ranked actions</text>
    <text x="460" y="313" fill="#8fa3bd" font-size="10.5" text-anchor="middle">→ outreach drafts</text>
    <text x="460" y="344" fill="#6b7b94" font-size="10" text-anchor="middle">Google Sheet CRM</text>
  </g>
  <g>
    <rect x="630" y="220" width="250" height="150" rx="12" fill="#15203a" stroke="#ff9ec1" stroke-width="2"/>
    <text x="755" y="248" fill="#ff9ec1" font-size="17" font-weight="700" text-anchor="middle">🌙 LifeBot</text>
    <text x="755" y="270" fill="#cdd9ec" font-size="11.5" text-anchor="middle">Life engine</text>
    <text x="755" y="296" fill="#8fa3bd" font-size="10.5" text-anchor="middle">inbox · calendar · people</text>
    <text x="755" y="313" fill="#8fa3bd" font-size="10.5" text-anchor="middle">→ evening brief</text>
    <text x="755" y="344" fill="#6b7b94" font-size="10" text-anchor="middle">Personal CRM + reminders</text>
  </g>

  <!-- connectors phone <-> engines -->
  <path d="M420 150 L200 220" stroke="#3a4a66" stroke-width="1.5" fill="none"/>
  <path d="M460 150 L460 220" stroke="#3a4a66" stroke-width="1.5" fill="none"/>
  <path d="M500 150 L720 220" stroke="#3a4a66" stroke-width="1.5" fill="none"/>

  <!-- shared bridge between engines -->
  <rect x="40" y="398" width="840" height="42" rx="9" fill="#101a2e" stroke="#3a4a66" stroke-width="1.5"/>
  <text x="460" y="424" fill="#9db3d1" font-size="12" text-anchor="middle">🔗 Shared bridge — captures &amp; reply-winning angles flow between engines; learning loops compound</text>

  <!-- data sources -->
  <text x="460" y="478" fill="#5ec1ff" font-size="12" font-weight="700" text-anchor="middle">CONNECTED SOURCES</text>
  <g fill="#1b2740" stroke="#2a3950">
    <rect x="60" y="492" width="150" height="40" rx="8"/>
    <rect x="230" y="492" width="150" height="40" rx="8"/>
    <rect x="400" y="492" width="150" height="40" rx="8"/>
    <rect x="570" y="492" width="150" height="40" rx="8"/>
    <rect x="740" y="492" width="120" height="40" rx="8"/>
  </g>
  <g fill="#cdd9ec" font-size="11" text-anchor="middle">
    <text x="135" y="517">📧 4 Gmail inboxes</text>
    <text x="305" y="517">📅 Google Calendar</text>
    <text x="475" y="517">💬 iMessage</text>
    <text x="645" y="517">✈ Telegram chats</text>
    <text x="800" y="517">👥 Contacts</text>
  </g>

  <!-- engine -->
  <rect x="260" y="560" width="400" height="40" rx="9" fill="#1b2740" stroke="#5ec1ff" stroke-width="1.5"/>
  <text x="460" y="585" fill="#ffffff" font-size="12" text-anchor="middle">⚙️ Runs automatically on your Mac (scheduled jobs) — no servers, no subscriptions</text>
</svg>
