<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="920" height="620" fill="#0e1420"/>
  <text x="460" y="40" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">BrainOS — System Architecture</text>
  <text x="460" y="64" fill="#5ec1ff" font-size="13" text-anchor="middle">One OS with a knowledge core, an interface agent, and two domain agents — run from your phone</text>

  <!-- YOU / phone -->
  <rect x="360" y="90" width="200" height="56" rx="10" fill="#1b2740" stroke="#5ec1ff" stroke-width="2"/>
  <text x="460" y="114" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">📱 You — Telegram</text>
  <text x="460" y="133" fill="#8fa3bd" font-size="10.5" text-anchor="middle">Grace (asks/notifies) · Saved Messages (archive)</text>

  <!-- Grace layer -->
  <rect x="300" y="166" width="320" height="34" rx="9" fill="#15203a" stroke="#5ec1ff" stroke-width="2"/>
  <text x="460" y="188" fill="#5ec1ff" font-size="13" font-weight="700" text-anchor="middle">② 📱 Grace — the interface agent</text>

  <!-- BrainOS core -->
  <rect x="300" y="218" width="320" height="74" rx="11" fill="#15203a" stroke="#7ee0a2" stroke-width="2.5"/>
  <text x="460" y="246" fill="#7ee0a2" font-size="17" font-weight="700" text-anchor="middle">① 🧠 BrainOS — The OS</text>
  <text x="460" y="268" fill="#cdd9ec" font-size="11" text-anchor="middle">knowledge core + daily orchestrator</text>
  <text x="460" y="284" fill="#8fa3bd" font-size="10.5" text-anchor="middle">capture → connect → brief → content (Obsidian vault)</text>

  <!-- two domain engines -->
  <g>
    <rect x="120" y="336" width="300" height="116" rx="12" fill="#15203a" stroke="#ff9ec1" stroke-width="2"/>
    <text x="270" y="364" fill="#ff9ec1" font-size="16" font-weight="700" text-anchor="middle">③ 🌙 LifeBot — Life</text>
    <text x="270" y="388" fill="#8fa3bd" font-size="11" text-anchor="middle">inbox · calendar · people</text>
    <text x="270" y="406" fill="#8fa3bd" font-size="11" text-anchor="middle">→ evening brief</text>
    <text x="270" y="434" fill="#6b7b94" font-size="10" text-anchor="middle">Personal CRM + reminders</text>
  </g>
  <g>
    <rect x="500" y="336" width="300" height="116" rx="12" fill="#15203a" stroke="#ffd479" stroke-width="2"/>
    <text x="650" y="364" fill="#ffd479" font-size="16" font-weight="700" text-anchor="middle">④ 💼 BizBot — Business</text>
    <text x="650" y="388" fill="#8fa3bd" font-size="11" text-anchor="middle">CRM → ranked actions</text>
    <text x="650" y="406" fill="#8fa3bd" font-size="11" text-anchor="middle">→ outreach drafts</text>
    <text x="650" y="434" fill="#6b7b94" font-size="10" text-anchor="middle">Google Sheet CRM</text>
  </g>

  <!-- connectors -->
  <path d="M460 146 L460 166" stroke="#3a4a66" stroke-width="1.5"/>
  <path d="M460 200 L460 218" stroke="#3a4a66" stroke-width="1.5"/>
  <path d="M390 292 L270 336" stroke="#3a4a66" stroke-width="1.5"/>
  <path d="M530 292 L650 336" stroke="#3a4a66" stroke-width="1.5"/>

  <!-- data sources -->
  <text x="460" y="486" fill="#5ec1ff" font-size="12" font-weight="700" text-anchor="middle">CONNECTED SOURCES (read-only; drafts written, never auto-sent)</text>
  <g fill="#1b2740" stroke="#2a3950">
    <rect x="60" y="500" width="150" height="38" rx="8"/>
    <rect x="230" y="500" width="150" height="38" rx="8"/>
    <rect x="400" y="500" width="150" height="38" rx="8"/>
    <rect x="570" y="500" width="150" height="38" rx="8"/>
    <rect x="740" y="500" width="120" height="38" rx="8"/>
  </g>
  <g fill="#cdd9ec" font-size="11" text-anchor="middle">
    <text x="135" y="524">📧 4 Gmail inboxes</text>
    <text x="305" y="524">📅 Google Calendar</text>
    <text x="475" y="524">💬 iMessage</text>
    <text x="645" y="524">✈ Telegram chats</text>
    <text x="800" y="524">👥 Contacts</text>
  </g>

  <rect x="260" y="562" width="400" height="38" rx="9" fill="#1b2740" stroke="#5ec1ff" stroke-width="1.5"/>
  <text x="460" y="586" fill="#ffffff" font-size="12" text-anchor="middle">⚙️ Runs automatically on your Mac — no servers, no subscriptions</text>
</svg>
